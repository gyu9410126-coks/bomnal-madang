<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지를 찾을 수 없습니다 — 시니어 봄날마당</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .error-wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 60px 20px 120px 20px;
      font-family: 'Nanum Gothic', 'Noto Sans KR', sans-serif;
      text-align: center;
    }
    .error-icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
    .error-code {
      font-size: 72px;
      font-weight: 700;
      color: #1a6fc4;
      margin-bottom: 8px;
      line-height: 1;
    }
    .error-title {
      font-size: 24px;
      color: #333;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .error-desc {
      font-size: 18px;
      color: #666;
      line-height: 1.8;
      margin-bottom: 40px;
    }
    .home-btn {
      display: block;
      width: 100%;
      padding: 20px;
      background: #1a6fc4;
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      border-radius: 12px;
      text-decoration: none;
      margin-bottom: 16px;
    }
    .back-btn {
      display: block;
      width: 100%;
      padding: 18px;
      background: #f1f5f9;
      color: #555;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      border-radius: 12px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="error-wrap">
    <div class="error-icon">🌸</div>
    <div class="error-code">404</div>
    <div class="error-title">페이지를 찾을 수 없습니다</div>
    <p class="error-desc">
      찾으시는 페이지가 없거나<br>
      주소가 잘못 입력되었습니다.<br>
      봄날마당 홈으로 돌아가세요!
    </p>
    <a class="home-btn" href="/index.html">🏠 봄날마당 홈으로 가기</a>
    <a class="back-btn" href="javascript:history.back()">← 이전 페이지로 돌아가기</a>
  </div>
</body>
</html>
