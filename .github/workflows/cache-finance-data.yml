# 파일명: .github/workflows/cache-finance-data.yml
# 역할: 매일 자동으로 scripts/cache-finance-data.mjs를 실행해서
#       서민금융교육 콘텐츠 데이터를 새로 받아오고, 저장소에 저장(커밋)해요.
# (한글 설명) 기존 cache-health-data.yml과는 완전히 별도 파일이에요(서로 안 건드림).

name: 서민금융교육 데이터 자동 캐싱

on:
  schedule:
    # (한글 설명) cron은 UTC 기준. 한국시간(KST) 새벽 4시 10분 = UTC 19시 10분(전날).
    #             건강 캐싱(새벽 4시)과 시간이 겹치지 않도록 10분 뒤로 살짝 늦췄어요.
    - cron: '10 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cache-finance-data:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 받아오기
        uses: actions/checkout@v4

      - name: Node.js 20 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 정부 API에서 데이터 받아와 JSON으로 저장
        env:
          FINANCE_EDU_KEY: ${{ secrets.FINANCE_EDU_KEY }}
        run: node scripts/cache-finance-data.mjs

      - name: 변경된 파일이 있으면 저장소에 커밋 & 푸시
        run: |
          git config user.name "bomnal-bot"
          git config user.email "actions@github.com"
          git add api/data/finance-data.json
          if git diff --cached --quiet; then
            echo "변경사항 없음 - 커밋 생략"
          else
            git commit -m "chore: 서민금융교육 데이터 자동 갱신 ($(date -u +'%Y-%m-%d'))"
            git push
          fi
