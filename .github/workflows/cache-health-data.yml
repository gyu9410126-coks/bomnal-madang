# 파일명: .github/workflows/cache-health-data.yml
# 역할: 매일 자동으로 scripts/cache-health-dictionaries.mjs를 실행해서
#       약효능·복용법 / 식품영양정보 데이터를 새로 받아오고, 저장소에 저장(커밋)해요.
#       (한글 설명) 저장소가 Public이라 GitHub Actions는 완전 무료로 무제한 사용 가능해요.

name: 건강 사전류 데이터 자동 캐싱

on:
  schedule:
    # (한글 설명) cron은 항상 UTC(세계표준시) 기준이에요. 한국시간(KST)은 UTC보다 9시간
    #             빨라서, "매일 한국시간 새벽 4시"에 실행되도록 "UTC 19시(전날)"로 넣었어요.
    - cron: '0 19 * * *'
  # (한글 설명) 자동 실행을 기다리지 않고, GitHub 저장소의 Actions 탭에서
  #             "Run workflow" 버튼을 눌러 수동으로도 바로 실행할 수 있게 해줘요.
  workflow_dispatch:

# (한글 설명) 저장소에 파일을 새로 커밋(저장)하려면 "쓰기 권한"이 필요해서 추가했어요.
permissions:
  contents: write

jobs:
  cache-health-data:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 받아오기
        uses: actions/checkout@v4

      - name: Node.js 20 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 정부 API에서 데이터 받아와 JSON으로 저장
        env:
          MEDICINE_API_KEY: ${{ secrets.MEDICINE_API_KEY }}
          FOOD_NUTRITION_API_KEY: ${{ secrets.FOOD_NUTRITION_API_KEY }}
        run: node scripts/cache-health-dictionaries.mjs

      - name: 변경된 파일이 있으면 저장소에 커밋 & 푸시
        run: |
          git config user.name "bomnal-bot"
          git config user.email "actions@github.com"
          git add api/data/medicine-data.json api/data/nutrition-data.json
          if git diff --cached --quiet; then
            echo "변경사항 없음 - 커밋 생략"
          else
            git commit -m "chore: 건강 사전류 데이터 자동 갱신 ($(date -u +'%Y-%m-%d'))"
            git push
          fi
