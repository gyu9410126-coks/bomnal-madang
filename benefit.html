<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>복지탭 — 시니어 봄날마당</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============================================
     복지·혜택 탭 (benefit.html)
     index.html이 fetch()로 이 파일을 불러와서
     #tab-benefit 안에 innerHTML로 삽입합니다
     ============================================ -->

<!-- 기초연금 계산기 카드 -->
<div class="card">
  <div class="card-title">🧮 내가 받을 수 있는 혜택은?</div>
  <div class="calc-label">나이</div>
  <select class="calc-select" id="calc-age">
    <option value="">나이를 선택해 주세요</option>
    <option value="60">60세</option><option value="61">61세</option><option value="62">62세</option>
    <option value="63">63세</option><option value="64">64세</option><option value="65">65세</option>
    <option value="66">66세</option><option value="67">67세</option><option value="68">68세</option>
    <option value="69">69세</option><option value="70">70세 이상</option>
  </select>
  <div class="calc-label">월 소득 (세금 빼고 실제 받는 금액)</div>
  <input class="calc-input" type="number" id="calc-income" placeholder="예: 500000 (오십만 원)" min="0">
  <div class="calc-label">국민연금 수령 여부</div>
  <select class="calc-select" id="calc-pension">
    <option value="">해당 여부를 선택해 주세요</option>
    <option value="y">연금 수령 중</option>
    <option value="n">연금 미수령</option>
  </select>
  <button class="btn-main" onclick="calcSupport()">💰 내가 받을 수 있는 지원금 확인하기</button>
  <div class="calc-result-box" id="calc-result">
    <div class="calc-result-label">이번 달 예상 지원금 총액</div>
    <div class="calc-result-amount" id="calc-amount">월 0원</div>
    <div class="calc-result-desc" id="calc-desc">구체적인 안내를 확인해 주세요</div>
  </div>
</div>

<!-- 쇼핑 바로가기 버튼 -->
<button class="btn-kakao-main" onclick="switchTab('market')">
  🛒 시니어 쇼핑 바로가기
</button>

<script>
function showToast(msg){
  var t=document.getElementById('toast-msg');
  if(!t){t=document.createElement('div');t.id='toast-msg';t.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.82);color:#fff;padding:12px 22px;border-radius:24px;font-size:14px;font-weight:700;z-index:9999;text-align:center;max-width:85%;line-height:1.6;word-break:keep-all;';document.body.appendChild(t);}
  t.textContent=msg;t.style.display='block';
  clearTimeout(t._timer);t._timer=setTimeout(function(){t.style.display='none';},3500);
}

function calcSupport(){
  var age=parseInt(document.getElementById('calc-age').value);
  var income=parseInt(document.getElementById('calc-income').value)||0;
  var pension=document.getElementById('calc-pension').value;
  if(!age||!pension){showToast('나이, 연금 수령 여부를 모두 선택해 주세요!');return;}
  var amount=0,desc='';
  if(age>=65){
    if(income<2000000){amount+=334000;}else if(income<3000000){amount+=200000;}
    desc+='✅ 기초연금: 올해 기준 최대 334,000원\n';
  }
  if(age>=60&&income<1500000){amount+=300000;desc+='✅ 노인일자리: 공익활동형 월 270,000원\n';}
  if(pension==='n'&&age>=60){desc+='✅ 국민연금 임의가입 검토 필요\n';}
  desc+='\n※ 실제 수령 금액은 개인마다, 지역마다 다를 수 있어요\n지금 바로 복지로에서 정확하게 확인해 주세요!';
  document.getElementById('calc-amount').textContent='월 '+amount.toLocaleString()+'원';
  document.getElementById('calc-desc').textContent=desc;
  document.getElementById('calc-result').classList.add('show');
}
</script>
</body>
</html>
