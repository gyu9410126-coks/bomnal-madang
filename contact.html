<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문의하기 — 시니어 봄날마당</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .contact-wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 20px 120px 20px;
      font-family: 'Nanum Gothic', 'Noto Sans KR', sans-serif;
    }
    .contact-wrap h1 {
      font-size: 24px;
      color: #1a6fc4;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .contact-wrap p {
      font-size: 18px;
      color: #333;
      line-height: 1.8;
      margin-bottom: 16px;
    }
    .contact-email-box {
      background: #e8f0fb;
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 24px;
      text-align: center;
    }
    .contact-email-box p {
      margin: 0;
      font-size: 18px;
      color: #1a6fc4;
      font-weight: 700;
    }
    .contact-form-btn {
      display: block;
      width: 100%;
      padding: 20px;
      background: #1a6fc4;
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      border-radius: 12px;
      text-decoration: none;
      margin-bottom: 16px;
    }
    .back-btn {
      display: block;
      width: 100%;
      padding: 18px;
      background: #f1f5f9;
      color: #555;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      border-radius: 12px;
      text-decoration: none;
      margin-top: 12px;
    }
    .notice-box {
      background: #fff8e1;
      border-left: 4px solid #f59e0b;
      border-radius: 6px;
      padding: 14px 16px;
      margin-bottom: 24px;
    }
    .notice-box p {
      margin: 0;
      font-size: 17px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="contact-wrap">
    <h1>📬 문의하기</h1>
    <p>봄날마당을 이용하시면서 불편한 점이나 궁금한 점을 알려주세요. 빠르게 도와드리겠습니다.</p>

    <div class="notice-box">
      <p>✅ 아래 버튼을 누르시면 문의 양식이 열립니다. 이름, 이메일, 문의 내용을 적어 보내주세요.</p>
    </div>

    <a class="contact-form-btn"
       href="https://docs.google.com/forms/d/e/1FAIpQLSfFRNFwI7fM_GpacmQJQMZHt6vNCrZXWwOf4dR1HSLjoMY9jA/viewform"
       target="_blank"
       rel="noopener noreferrer">
      📝 문의 양식 작성하기
    </a>

    <div class="contact-email-box">
      <p>📧 bomnal.madang@gmail.com</p>
    </div>

    <p style="font-size:16px; color:#888; text-align:center;">이메일로 직접 보내셔도 됩니다.<br>평일 기준 1~2일 내 답변 드립니다.</p>

    <a class="back-btn" href="javascript:history.back()">← 이전 페이지로 돌아가기</a>
  </div>
</body>
</html>
